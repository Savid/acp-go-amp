name: Docs

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  mintlify:
    runs-on: [self-hosted]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 24

      - name: Check Mintlify links
        run: npx -y mint@4.2.566 broken-links
